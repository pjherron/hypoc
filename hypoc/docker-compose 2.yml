version: '3.8'

# Project Hypoc-Face - Multi-Service Docker Compose
# Phase 0: Single OpenCode web container (working)
# Phase 1: Add postgres, redis, keycloak, hypoc-face-core
# Phase 2: Add qdrant, hypoc-face-rag
# Phase 3: Add hypoc-face-router
# Phase 4: Add rabbitmq, hypoc-face-workspace, hypoc-face-agent
# Phase 5: Add monitoring (prometheus, grafana, loki)

services:
  # ============================================================================
  # PHASE 0 - OpenCode Web (Current Working Setup)
  # ============================================================================
  opencode-web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        USERNAME: ${USER:-developer}
        USER_UID: ${UID:-1000}
        USER_GID: ${GID:-1000}
    image: opencode-web:latest
    container_name: opencode-web
    ports:
      - "8080:8080"  # OpenCode web interface
    networks:
      - hypoc-face-network
    volumes:
      - ./workspace:/workspace
      - npm-cache:/home/${USER:-developer}/.npm
      - pip-cache:/home/${USER:-developer}/.cache/pip
      - bash-history:/home/${USER:-developer}/.bash_history
    shm_size: '2gb'
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 4G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /workspace
    # Once hypoc-face-core is ready, connect to it:
    # environment:
    #   - HYPOC-FACE_CORE_URL=http://hypoc-face-core:8000
    #   - HYPOC-FACE_RAG_URL=http://hypoc-face-rag:8001
    #   - HYPOC-FACE_ROUTER_URL=http://hypoc-face-router:8002

  # ============================================================================
  # PHASE 1 - Core Infrastructure (Coming Next)
  # ============================================================================
  
  # PostgreSQL - User data, sessions, RBAC
  postgres:
    image: postgres:16-alpine
    container_name: hypoc-face-postgres
    environment:
      POSTGRES_USER: hypoc-face
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: hypoc-face
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - hypoc-face-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hypoc-face"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    profiles:
      - phase1
      - full

  # Redis - Session store, caching, rate limiting
  redis:
    image: redis:7-alpine
    container_name: hypoc-face-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - hypoc-face-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    profiles:
      - phase1
      - full

  # Keycloak - SSO authentication
  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: hypoc-face-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: hypoc-face
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      KC_HOSTNAME: localhost
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    command: start-dev
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hypoc-face-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    profiles:
      - phase1
      - full

  # Hypoc-Face Core - Backend API
  hypoc-face-core:
    build:
      context: ./hypoc-face-core
      dockerfile: Dockerfile
    image: hypoc-face-core:latest
    container_name: hypoc-face-core
    environment:
      DATABASE_URL: postgresql://hypoc-face:${POSTGRES_PASSWORD:-changeme}@postgres:5432/hypoc-face
      REDIS_URL: redis://redis:6379/0
      AUTH_PROVIDER: ${AUTH_PROVIDER:-none}  # none, cognito_mock, or cognito
      COGNITO_USER_POOL_ID: ${COGNITO_USER_POOL_ID:-}
      COGNITO_REGION: ${COGNITO_REGION:-us-east-1}
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hypoc-face-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    profiles:
      - phase1
      - full

  # ============================================================================
  # PHASE 2 - RAG & Intelligence
  # ============================================================================
  
  # Qdrant - Vector database for RAG
  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: hypoc-face-qdrant
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - hypoc-face-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    profiles:
      - phase2
      - full

  # Hypoc-Face RAG - Retrieval augmented generation
  hypoc-face-rag:
    build:
      context: ./hypoc-face-rag
      dockerfile: Dockerfile
    image: hypoc-face-rag:latest
    container_name: hypoc-face-rag
    environment:
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/1
      EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
      EMBEDDING_DEVICE: cpu
      INDEX_SKILLS_ON_STARTUP: "true"
      LOG_LEVEL: info
    ports:
      - "8001:8001"
    volumes:
      - ./skills:/app/skills:ro
      - ./agents:/app/agents:ro
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hypoc-face-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    profiles:
      - phase2
      - full

  # ============================================================================
  # PHASE 3 - Model Routing & Multiplexing
  # ============================================================================
  
  # Hypoc-Face Router - Smart model routing
  hypoc-face-router:
    build:
      context: ./hypoc-face-router
      dockerfile: Dockerfile
    image: hypoc-face-router:latest
    container_name: hypoc-face-router
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: us-east-1
      REDIS_URL: redis://redis:6379/2
      DEFAULT_MODEL: gpt-4o-mini
      ENABLE_FALLBACK: "true"
      LOG_LEVEL: info
    ports:
      - "8002:8002"
    depends_on:
      redis:
        condition: service_healthy
      hypoc-face-rag:
        condition: service_healthy
    networks:
      - hypoc-face-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    profiles:
      - phase3
      - full

  # ============================================================================
  # PHASE 4 - Advanced Features (Agent Orchestration, Workspaces)
  # ============================================================================
  
  # RabbitMQ - Message queue for agent tasks
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: hypoc-face-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: hypoc-face
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-changeme}
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - hypoc-face-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    profiles:
      - phase4
      - full

  # Hypoc-Face Agent - Agent orchestration
  hypoc-face-agent:
    build:
      context: ./hypoc-face-agent
      dockerfile: Dockerfile
    image: hypoc-face-agent:latest
    container_name: hypoc-face-agent
    environment:
      RABBITMQ_URL: amqp://hypoc-face:${RABBITMQ_PASSWORD:-changeme}@rabbitmq:5672
      REDIS_URL: redis://redis:6379/3
      AGENT_REGISTRY_PATH: /app/agents
      CELERY_WORKERS: 10
      LOG_LEVEL: info
    ports:
      - "8004:8004"
    volumes:
      - ./agents:/app/agents:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hypoc-face-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    profiles:
      - phase4
      - full

  # Hypoc-Face Agent Worker (Celery)
  hypoc-face-agent-worker:
    build:
      context: ./hypoc-face-agent
      dockerfile: Dockerfile
    image: hypoc-face-agent:latest
    container_name: hypoc-face-agent-worker
    command: celery -A tasks worker --loglevel=info --concurrency=10
    environment:
      RABBITMQ_URL: amqp://hypoc-face:${RABBITMQ_PASSWORD:-changeme}@rabbitmq:5672
      REDIS_URL: redis://redis:6379/3
      AGENT_REGISTRY_PATH: /app/agents
      LOG_LEVEL: info
    volumes:
      - ./agents:/app/agents:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - hypoc-face-network
    restart: unless-stopped
    deploy:
      replicas: 3  # Scale workers as needed
    profiles:
      - phase4
      - full

  # Hypoc-Face Workspace - Workspace management
  hypoc-face-workspace:
    build:
      context: ./hypoc-face-workspace
      dockerfile: Dockerfile
    image: hypoc-face-workspace:latest
    container_name: hypoc-face-workspace
    environment:
      CONTAINER_RUNTIME: docker
      STORAGE_BACKEND: local
      REDIS_URL: redis://redis:6379/4
      DEFAULT_CPU_LIMIT: "1.0"
      DEFAULT_MEMORY_LIMIT: 2Gi
      DEFAULT_DISK_LIMIT: 10Gi
      CLEANUP_ENABLED: "true"
      LOG_LEVEL: info
    ports:
      - "8003:8003"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # Docker-in-Docker
      - ./workspaces:/workspaces
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - hypoc-face-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    profiles:
      - phase4
      - full

  # ============================================================================
  # PHASE 5 - Monitoring & Observability
  # ============================================================================
  
  # Prometheus - Metrics collection
  prometheus:
    image: prom/prometheus:v2.48.1
    container_name: hypoc-face-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - hypoc-face-network
    restart: unless-stopped
    profiles:
      - monitoring
      - full

  # Grafana - Metrics visualization
  grafana:
    image: grafana/grafana:10.2.3
    container_name: hypoc-face-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - hypoc-face-network
    restart: unless-stopped
    profiles:
      - monitoring
      - full

  # Loki - Log aggregation
  loki:
    image: grafana/loki:2.9.3
    container_name: hypoc-face-loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - hypoc-face-network
    restart: unless-stopped
    profiles:
      - monitoring
      - full

  # Promtail - Log collector
  promtail:
    image: grafana/promtail:2.9.3
    container_name: hypoc-face-promtail
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - hypoc-face-network
    restart: unless-stopped
    profiles:
      - monitoring
      - full

# ============================================================================
# VOLUMES
# ============================================================================
volumes:
  # Phase 0
  npm-cache:
    driver: local
  pip-cache:
    driver: local
  bash-history:
    driver: local
  
  # Phase 1
  postgres-data:
    driver: local
  redis-data:
    driver: local
  
  # Phase 2
  qdrant-data:
    driver: local
  
  # Phase 4
  rabbitmq-data:
    driver: local
  
  # Phase 5
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  loki-data:
    driver: local

# ============================================================================
# NETWORKS
# ============================================================================
networks:
  hypoc-face-network:
    driver: bridge
    name: hypoc-face

# ============================================================================
# USAGE
# ============================================================================
# Phase 0 (Current - OpenCode web only):
#   docker compose up -d
#
# Phase 1 (Core infrastructure):
#   docker compose --profile phase1 up -d
#
# Phase 2 (Add RAG):
#   docker compose --profile phase1 --profile phase2 up -d
#
# Phase 3 (Add routing):
#   docker compose --profile phase1 --profile phase2 --profile phase3 up -d
#
# Phase 4 (Add agents + workspaces):
#   docker compose --profile phase1 --profile phase2 --profile phase3 --profile phase4 up -d
#
# Phase 5 (Add monitoring):
#   docker compose --profile full up -d
#
# Or use "full" profile to start everything:
#   docker compose --profile full up -d
