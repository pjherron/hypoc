# Enterprise AI Developer Platform
# Starts all services: PostgreSQL, Redis, hypoc-face-core (API), hypoc-face-router (model routing)
# Ollama and self-hosted LLM run separately on the host or a dedicated server.

services:

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hypoc
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  hypoc-face-core:
    build:
      context: ./hypoc-face/hypoc-face-core
    ports:
      - "8002:8000"
    env_file:
      - ./hypoc-face/hypoc-face-core/.env
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/hypoc
      REDIS_URL: redis://redis:6379/0

  hypoc-face-router:
    build:
      context: ./hypoc-face/hypoc-face-router
    ports:
      - "8001:8001"
    env_file:
      - ./hypoc-face/hypoc-face-router/.env
    depends_on:
      - postgres
      - redis
    environment:
      POSTGRES_DSN: postgresql://postgres:postgres@postgres:5432/hypoc
      REDIS_URL: redis://redis:6379/2
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload


volumes:
  postgres_data:
